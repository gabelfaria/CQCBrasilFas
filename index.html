<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQC Brasil - Calendário de Episódios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #fff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            font-size: 1em;
            color: #aaa;
            margin-bottom: 20px;
        }

        .legend {
            display: inline-block;
            padding: 15px 25px;
            background: #111;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            margin-right: 25px;
        }

        .legend-box {
            width: 18px;
            height: 18px;
            border-radius: 3px;
        }

        .legend-red { background: #ff0000; }
        .legend-yellow { background: #ffcc00; }

        /* DESKTOP VIEW */
        .desktop-view { display: block; }
        .mobile-view { display: none; }

        .year-container {
            overflow-x: auto;
            padding-bottom: 30px;
            margin-bottom: 30px;
            scrollbar-width: thick;
            scrollbar-color: #ffcc00 #111;
        }
        .desktop-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .nav-btn {
            background: #111;
            border: 1px solid #ffcc00;
            color: #ffcc00;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1em;
        }
        .nav-btn:hover { background: #ffcc00; color: #000; }

        .year-scroll {
            display: flex;
            gap: 40px;
            min-width: min-content;
            padding: 0 20px;
        }

        .year-section {
            flex: 0 0 auto;
            min-width: 1200px;
            background: #0a0a0a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .year-title {
            font-size: 2.5em;
            color: #ffcc00;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: bold;
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .month {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .month-name {
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffcc00;
            text-transform: uppercase;
            font-size: 1em;
            text-align: center;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            font-size: 0.85em;
        }

        .day-header {
            color: #666;
            font-weight: bold;
            padding: 5px 0;
            text-align: center;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            background: #000;
            color: #444;
            text-decoration: none;
        }

        .monday {
            background-color: #ff0000;
            color: #fff;
            font-weight: bold;
        }

        .episode {
            background-color: #ffcc00;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.3);
        }

        .episode:hover {
            transform: scale(1.3);
            background-color: #fff;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* MOBILE VIEW */
        @media (max-width: 768px) {
            .desktop-view { display: none; }
            .mobile-view { display: block; }

            h1 { font-size: 1.8em; }
            .legend { display: block; width: 100%; }
            .legend-item { display: flex; margin-bottom: 10px; }

            .mobile-controls {
                display: flex;
                gap: 10px;
                margin-bottom: 25px;
                justify-content: center;
            }

            select {
                padding: 12px;
                background: #111;
                color: #ffcc00;
                border: 2px solid #ffcc00;
                border-radius: 8px;
                font-family: inherit;
                font-size: 1.1em;
            }

            .mobile-month {
                background: #0a0a0a;
                padding: 25px;
                border-radius: 12px;
                border: 1px solid #222;
            }

            .mobile-month-name {
                font-size: 1.8em;
                color: #ffcc00;
                margin-bottom: 20px;
                text-align: center;
                text-transform: uppercase;
            }

            .mobile-calendar-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 8px;
            }

            .mobile-day {
                aspect-ratio: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 6px;
                font-size: 1.1em;
                background: #000;
                color: #333;
                text-decoration: none;
            }

            .mobile-monday { background-color: #ff0000; color: #fff; }
            .mobile-episode { background-color: #ffcc00; color: #000; font-weight: bold; }
        }

        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CQC BRASIL</h1>
        <p class="subtitle">O Acervo Definitivo (2008 - 2015)</p>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-box legend-red"></div>
                <span>Segundas-feiras</span>
            </div>
            <div class="legend-item">
                <div class="legend-box legend-yellow"></div>
                <span>Episódio Disponível (Clique para assistir)</span>
            </div>
        </div>
    </div>

    <!-- DESKTOP VIEW -->
    <div class="desktop-view">
        <div class="desktop-nav">
            <button class="nav-btn" id="prev-year">← Ano anterior</button>
            <button class="nav-btn" id="next-year">Próximo ano →</button>
        </div>
        <div class="year-container">
            <div class="year-scroll" id="year-scroll"></div>
        </div>
    </div>

    <!-- MOBILE VIEW -->
    <div class="mobile-view">
        <div class="mobile-controls">
            <select id="month-select">
                <option value="0">Janeiro</option><option value="1">Fevereiro</option>
                <option value="2">Março</option><option value="3">Abril</option>
                <option value="4">Maio</option><option value="5">Junho</option>
                <option value="6">Julho</option><option value="7">Agosto</option>
                <option value="8">Setembro</option><option value="9">Outubro</option>
                <option value="10">Novembro</option><option value="11">Dezembro</option>
            </select>
            <select id="year-select"></select>
        </div>
        <div class="mobile-month" id="mobile-month-container"></div>
    </div>

    <footer>
        <p>Inspirado no estilo throwback do archive.org</p>
        <p>CQC Brasil - Rede Bandeirantes</p>
    </footer>

    <script>
        // Banco de dados de links coletados
        const rawEntries = [
            { date: "2008-03-17", title: "Programa completo", url: "https://www.youtube.com/watch?v=9Lt5m80fMTE" },
            { date: "2009-03-09", title: "Programa completo", url: "https://www.youtube.com/watch?v=CYay0K9T2S4" },
            { date: "2011-03-14", title: "Programa completo", url: "https://www.youtube.com/watch?v=uHDLsc2bV3E" },
            { date: "2011-03-21", title: "Programa completo", url: "https://www.youtube.com/watch?v=uHDLsc2bV3E" },
            { date: "2011-03-28", title: "Programa completo", url: "https://www.youtube.com/watch?v=uHDLsc2bV3E" },
            { date: "2011-08-22", title: "Programa completo", url: "https://www.youtube.com/watch?v=9Lt5m80fMTE" },
            { date: "2011-08-29", title: "Programa completo", url: "https://www.youtube.com/watch?v=aVBVPVkJoKY" },
            { date: "2011-09-05", title: "Programa completo", url: "https://www.youtube.com/watch?v=CYay0K9T2S4" },
            { date: "2011-09-12", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2011-09-19", title: "Programa completo", url: "https://www.youtube.com/watch?v=AcmK2J8b_4w" },
            { date: "2011-09-26", title: "Programa completo", url: "https://www.youtube.com/watch?v=uHDLsc2bV3E" },
            { date: "2011-10-03", title: "Programa completo", url: "https://www.youtube.com/watch?v=fW1t4OcQSCI" },
            { date: "2012-12-17", title: "Programa completo", url: "https://www.youtube.com/watch?v=9Lt5m80fMTE" },
            { date: "2013-06-17", title: "Programa completo", url: "https://www.youtube.com/watch?v=fW1t4OcQSCI" },
            { date: "2015-03-09", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-03-16", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-03-23", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-03-30", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-04-06", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-04-13", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-04-20", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-04-27", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-05-04", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" },
            { date: "2015-05-11", title: "Programa completo", url: "https://www.youtube.com/watch?v=vkTiFV8wrRk" }
        ];
        const episodeLinks = {};
        rawEntries.forEach(entry => {
            if (!episodeLinks[entry.date]) episodeLinks[entry.date] = [];
            episodeLinks[entry.date].push({ title: entry.title, url: entry.url });
        });
        Object.keys(episodeLinks).forEach(date => {
            const [year, month, day] = date.split("-");
            episodeLinks[date].push({
                title: "Busca no YouTube",
                url: `https://www.youtube.com/results?search_query=CQC+${day}%2F${month}%2F${year}+completo`
            });
        });

        const seasons = [
            { year: 2008, start: "2008-03-17", end: "2008-12-29" },
            { year: 2009, start: "2009-03-09", end: "2009-12-28" },
            { year: 2010, start: "2010-03-15", end: "2010-12-27" },
            { year: 2011, start: "2011-03-14", end: "2011-12-26" },
            { year: 2012, start: "2012-03-12", end: "2012-12-24" },
            { year: 2013, start: "2013-03-18", end: "2013-12-30" },
            { year: 2014, start: "2014-03-17", end: "2014-12-29" },
            { year: 2015, start: "2015-03-09", end: "2015-12-28" }
        ];

        const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const dayHeaders = ["D", "S", "T", "Q", "Q", "S", "S"]; 

        function getFormattedDate(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function createDayElement(year, month, day, isMobile = false) {
            const dateStr = getFormattedDate(year, month, day);
            const dateObj = new Date(year, month, day);
            const isMon = dateObj.getDay() === 1;
            const links = episodeLinks[dateStr];
            
            const el = document.createElement('div');
            el.className = isMobile ? 'mobile-day' : 'day';
            el.innerText = day;

            if (links) {
                el.classList.add(isMobile ? 'mobile-episode' : 'episode');
                el.title = "Abrir conteúdos de " + day + "/" + (month+1) + "/" + year;
                el.onclick = () => {
                    const linksText = links.map((item, i) => `${i + 1}. ${item.title}\n${item.url}`).join("\n\n");
                    alert(`Conteúdos de ${day}/${month + 1}/${year}\n\n${linksText}`);
                };
            } else if (isMon) {
                el.classList.add(isMobile ? 'mobile-monday' : 'monday');
            }

            return el;
        }

        // DESKTOP RENDER
        const yearScroll = document.getElementById('year-scroll');
        seasons.forEach(season => {
            const section = document.createElement('div');
            section.className = 'year-section';
            section.innerHTML = `<div class="year-title">${season.year}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'months-grid';

            for (let m = 0; m < 12; m++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month';
                monthDiv.innerHTML = `<div class="month-name">${monthNames[m]}</div>`;
                
                const cal = document.createElement('div');
                cal.className = 'calendar-grid';
                dayHeaders.forEach(h => cal.innerHTML += `<div class="day-header">${h}</div>`);

                const firstDay = new Date(season.year, m, 1).getDay();
                const daysInMonth = new Date(season.year, m + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) cal.appendChild(document.createElement('div'));
                for (let d = 1; d <= daysInMonth; d++) cal.appendChild(createDayElement(season.year, m, d));
                
                monthDiv.appendChild(cal);
                grid.appendChild(monthDiv);
            }
            section.appendChild(grid);
            yearScroll.appendChild(section);
        });

        // MOBILE RENDER
        const yearSelect = document.getElementById('year-select');
        seasons.forEach(s => yearSelect.innerHTML += `<option value="${s.year}">${s.year}</option>`);

        function updateMobile() {
            const y = parseInt(yearSelect.value);
            const m = parseInt(document.getElementById('month-select').value);
            const container = document.getElementById('mobile-month-container');
            container.innerHTML = `<div class="mobile-month-name">${monthNames[m]} ${y}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'mobile-calendar-grid';
            dayHeaders.forEach(h => grid.innerHTML += `<div class="mobile-day-header">${h}</div>`);

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= daysInMonth; d++) grid.appendChild(createDayElement(y, m, d, true));
            
            container.appendChild(grid);
        }

        yearSelect.onchange = document.getElementById('month-select').onchange = updateMobile;
        updateMobile();

        const yearContainer = document.querySelector('.year-container');
        document.getElementById('prev-year').onclick = () => {
            yearContainer.scrollBy({ left: -1240, behavior: 'smooth' });
        };
        document.getElementById('next-year').onclick = () => {
            yearContainer.scrollBy({ left: 1240, behavior: 'smooth' });
        };
    </script>
</body>
</html>
